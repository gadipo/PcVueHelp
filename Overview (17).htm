        <h1 class="SVheading1"><a name="kanchor174"></a><a name="kanchor175"></a>Overview of Operators</h1>
        <p class="SVnormal">There are two kinds of operators: arithmetic and logical. 
 These are described in the next two topics.</p>
        <div class="note">
            <p class="SVnormal">All of the operators may only be used on numeric variables 
 or expressions (Integer, Long, Single, Double and Const). The variables 
 or expressions must be of the same type.</p>
        </div>
