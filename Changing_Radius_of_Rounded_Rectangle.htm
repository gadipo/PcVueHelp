        <h1 class="SVheading1">Changing the Corner Radius of a Rounded Rectangle</h1>
        <p class="SVnormal">You can change the corner radius of a rounded rectangle 
 either from the Properties dialog or by clicking and dragging the radius 
 handle that is displayed when the drawing is selected.</p>
