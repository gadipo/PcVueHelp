        <h1 class="SVheading1">
            SetFilter Method</h1>
        <p class="SVnormal">Changes the filter for the object's list. </p>
        <h2 class="SVheading2">Syntax</h2>
        <p><span style="font-style: italic;">object</span><span style="font-weight: bold;">.SetFilter 
 (</span><span style="font-style: italic;">filter</span><span style="font-weight: bold;"> 
 As String)</span> <span style="font-weight: bold;">As Boolean</span></p>
        <p style="margin-bottom: 0;" MadCap:conditions="Primary.SvOnly">Equivalent to the FILTER mode of the SCADA 
 BASIC instruction, LOGDISPLAY.</p>
        <p>One or more Set methods must be followed by an Execute method before 
 the effect takes place. </p>
