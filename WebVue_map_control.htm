        <h1 class="SVheading1"><a name="kanchor158"></a>Map control in WebVue</h1>
        <p class="SVnormal">The Map control is partially supported in WebVue.</p>
        <div class="note">
            <p class="SVnormal">You cannot use a local map cache if the mimic containing the Map control is to be displayed in WebVue. Only a selection of online providers are supported.</p>
        </div>
