    <body> <h1 class="SVheading1">Application Object</h1><p class="SVnormal">&#160;<object classid="clsid:ADB880A6-D8FF-11CF-9377-00AA003B7A11" type="application/x-oleobject" id="mc97"><param name="Command" value="ALink,MENU" /><param name="Item1" value="" /><param name="Item2" value="hmobjApplicationCL" /></object><a class="MCConceptLink_seealso_0" href="javascript:mc97.Click()"><img src="../../../SkinSupport/ConceptLink.gif" style="border: none;margin-right: 5px;" alt="Concept Link Icon" />See also</a>&#160;<object classid="clsid:ADB880A6-D8FF-11CF-9377-00AA003B7A11" type="application/x-oleobject" id="mc98"><param name="Command" value="ALink,MENU" /><param name="Item1" value="" /><param name="Item2" value="hmobjApplicationXL" /></object><a class="MCConceptLink_example_0" href="javascript:mc98.Click()"><img src="../../../SkinSupport/ConceptLink.gif" style="border: none;margin-right: 5px;" alt="Concept Link Icon" />Example</a>&#160;<object classid="clsid:ADB880A6-D8FF-11CF-9377-00AA003B7A11" type="application/x-oleobject" id="mc99"><param name="Command" value="ALink,MENU" /><param name="Item1" value="" /><param name="Item2" value="hmobjApplicationPL" /></object><a class="MCConceptLink_props_0" href="javascript:mc99.Click()"><img src="../../../SkinSupport/ConceptLink.gif" style="border: none;margin-right: 5px;" alt="Concept Link Icon" />Properties</a>&#160;<object classid="clsid:ADB880A6-D8FF-11CF-9377-00AA003B7A11" type="application/x-oleobject" id="mc100"><param name="Command" value="ALink,MENU" /><param name="Item1" value="" /><param name="Item2" value="hmobjApplicationML" /></object><a class="MCConceptLink_methods_0" href="javascript:mc100.Click()"><img src="../../../SkinSupport/ConceptLink.gif" style="border: none;margin-right: 5px;" alt="Concept Link Icon" />Methods</a>&#160;&#160;</p><p class="SVnormal">The <span style="font-weight: bold;">Application</span> object represents the HMI itself and is the topmost object in the HMI
 object tree.</p><p>From the <span style="font-weight: bold;">Application</span> object,
 you can directly access other HMI objects by using the <span style="font-weight: bold;">Application </span>object’s properties and methods.</p><p style="margin-bottom: 0;">&#160;</p><script type="text/javascript" src="../../../SkinSupport/MadCapBodyEnd.js"></script></body>
