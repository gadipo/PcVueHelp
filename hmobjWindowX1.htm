    <body> <h1 class="SVheading1">Window Zoom Example</h1><p class="SVprogramCode"><!-- EXAMPLE -->Private Sub ZoomOut_Click()<br />'-------- Doubles the zoom on a window of the Mimic FVObjects5<br />&#160;Dim ObjWindow 
 As Object <br />&#160;Set ObjWindow 
 = FVObjects5.Windows.Item(1)<br />&#160;ObjWindow.Zoom 
 ObjWindow.ZoomRatio*2, 0, 0<br />&#160;Text1.Text 
 = "Current zoom is " &amp; ObjWindow.ZoomRatio<br />End Sub</p><script type="text/javascript" src="../../../SkinSupport/MadCapBodyEnd.js"></script></body>
