        <h1 class="SVheading1">Re-shaping a Polyline or Polygon</h1>
        <p class="SVnormal">When a polygon or polyline is selected, a handle is displayed 
 at each node. These handles may be used in the same way as for a normal 
 drawing element except that instead of re-sizing the drawing element, 
 they are used to re-shape it. </p>
