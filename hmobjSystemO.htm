    <body> <h1 class="SVheading1">System Object</h1><p class="SVnormal">&#160;<object classid="clsid:ADB880A6-D8FF-11CF-9377-00AA003B7A11" type="application/x-oleobject" id="mc156"><param name="Command" value="ALink,MENU" /><param name="Item1" value="" /><param name="Item2" value="hmobjSystemCL" /></object><a class="MCConceptLink_seealso_0" href="javascript:mc156.Click()"><img src="../../../SkinSupport/ConceptLink.gif" style="border: none;margin-right: 5px;" alt="Concept Link Icon" />See also</a>&#160;<object classid="clsid:ADB880A6-D8FF-11CF-9377-00AA003B7A11" type="application/x-oleobject" id="mc157"><param name="Command" value="ALink,MENU" /><param name="Item1" value="" /><param name="Item2" value="hmobjSystemXL" /></object><a class="MCConceptLink_example_0" href="javascript:mc157.Click()"><img src="../../../SkinSupport/ConceptLink.gif" style="border: none;margin-right: 5px;" alt="Concept Link Icon" />Example</a>&#160;<object classid="clsid:ADB880A6-D8FF-11CF-9377-00AA003B7A11" type="application/x-oleobject" id="mc158"><param name="Command" value="ALink,MENU" /><param name="Item1" value="" /><param name="Item2" value="hmobjSystemPL" /></object><a class="MCConceptLink_props_0" href="javascript:mc158.Click()"><img src="../../../SkinSupport/ConceptLink.gif" style="border: none;margin-right: 5px;" alt="Concept Link Icon" />Properties</a>&#160;<object classid="clsid:ADB880A6-D8FF-11CF-9377-00AA003B7A11" type="application/x-oleobject" id="mc159"><param name="Command" value="ALink,MENU" /><param name="Item1" value="" /><param name="Item2" value="hmobjSystemML" /></object><a class="MCConceptLink_methods_0" href="javascript:mc159.Click()"><img src="../../../SkinSupport/ConceptLink.gif" style="border: none;margin-right: 5px;" alt="Concept Link Icon" />Methods</a>&#160;</p><p class="SVnormal">The System object represents the system on which the
 HMI is running.</p><p>This object is available through the <span style="font-weight: bold;">System</span> property of the <span style="font-weight: bold;">Application</span> object.</p><p><span style="font-weight: bold;">ThisSystem</span> is a pre-defined
 instance of the object.</p><script type="text/javascript" src="../../../SkinSupport/MadCapBodyEnd.js"></script></body>
