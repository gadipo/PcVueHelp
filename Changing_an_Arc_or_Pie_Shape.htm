        <h1 class="SVheading1">Changing an Arc or Pie Shape</h1>
        <p class="SVnormal">You can change the segment of an Arc and the angle of 
 the sector on the Pie either from the Drawing Properties dialog or by clicking 
 and dragging the handles displayed when the drawing is selected.</p>
