    <body> <h1 class="SVheading1">EnableEvents Property</h1><p class="SVnormal">&#160;<object classid="clsid:ADB880A6-D8FF-11CF-9377-00AA003B7A11" type="application/x-oleobject" id="mc228"><param name="Command" value="ALink,MENU" /><param name="Item1" value="" /><param name="Item2" value="hmobjEnableEventsCL" /></object><a class="MCConceptLink_seealso_0" href="javascript:mc228.Click()"><img src="../../../SkinSupport/ConceptLink.gif" style="border: none;margin-right: 5px;" alt="Concept Link Icon" />See also</a>&#160;<object classid="clsid:ADB880A6-D8FF-11CF-9377-00AA003B7A11" type="application/x-oleobject" id="mc229"><param name="Command" value="ALink,MENU" /><param name="Item1" value="" /><param name="Item2" value="hmobjEnableEventsAL" /></object><a class="MCConceptLink_applies_0" href="javascript:mc229.Click()"><img src="../../../SkinSupport/ConceptLink.gif" style="border: none;margin-right: 5px;" alt="Concept Link Icon" />Applies to</a>&#160;</p><h2 class="SVheading2">Description</h2><p>Returns or sets the Boolean that indicates if events must (True) or 
 must not (False) be fired for the object. Read/Write.</p><h2 class="SVheading2">Syntax</h2><p><span style="font-style: italic;">object</span><span style="font-weight: bold;">.EnableEvents</span> 
 [<span style="font-style: italic;">= Boolean</span>]</p><p>When this property is disabled, mimic associated scripts are not performed.</p><script type="text/javascript" src="../../../SkinSupport/MadCapBodyEnd.js"></script></body>
