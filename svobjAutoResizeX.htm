    <body> <h1 class="SVheading1">Auto Resize Grid control Example</h1><p>This script automatically adapts the size of the Grid control so that 
 all cells and rows are visible.</p><p class="SVprogramCode" style="margin-top: 0pt;margin-bottom: 0pt;">Private Sub Shape2_Click()</p><p class="SVprogramCode" style="margin-top: 0pt;margin-bottom: 0pt;text-indent: 0.5in;">AIGrid1.Width = AIGrid1.TotalWidth</p><p class="SVprogramCode" style="margin-top: 0pt; margin-bottom: 0pt; text-indent: 0.5in;">AIGrid1.Height = AIGrid1.TotalHeight</p><p class="SVprogramCode" style="margin-top: 0pt;margin-bottom: 0pt;">End Sub</p><p class="SVprogramCode">&#160;</p><script type="text/javascript" src="../../../SkinSupport/MadCapBodyEnd.js"></script></body>
